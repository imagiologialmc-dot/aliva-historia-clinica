<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>História Clínica — Aliva Saúde</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2a7a9b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Aliva Clínica"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #eaf6f6; padding: 20px; font-size: 16px; }
    .card { background: white; border-radius: 14px; padding: 28px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 18px rgba(61,188,184,0.15); }

    /* Header */
    .header { text-align: center; margin-bottom: 24px; }
    .header img { height: 64px; margin-bottom: 10px; }
    .header h1 { color: #2a7a9b; font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
    .header p { color: #5fa8b8; font-size: 13px; margin-top: 2px; }

    .section-title {
      font-weight: 700; color: #2a7a9b; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 22px 0 10px;
      border-bottom: 2px solid #3dbcb8;
      padding-bottom: 5px;
    }
    label { display: block; font-size: 14px; color: #3a3a3a; margin-bottom: 4px; margin-top: 12px; font-weight: 500; }
    input[type="text"], input[type="date"], input[type="email"], textarea {
      width: 100%; padding: 10px 13px; border: 1.5px solid #b2e0de;
      border-radius: 8px; font-size: 15px; background: #f7fdfd;
      transition: border 0.2s, box-shadow 0.2s; color: #222;
    }
    input:focus, textarea:focus {
      outline: none; border-color: #3dbcb8;
      background: white; box-shadow: 0 0 0 3px rgba(61,188,184,0.15);
    }
    textarea { resize: vertical; min-height: 80px; }
    .radio-group { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .radio-group label { margin: 0; display: flex; align-items: center; gap: 6px; font-size: 15px; cursor: pointer; font-weight: 400; }
    input[type="radio"] { width: 18px; height: 18px; accent-color: #3dbcb8; }
    .conditional { display: none; margin-top: 8px; }
    .conditional.show { display: block; }

    /* Buttons */
    .btn-primary {
      display: block; width: 100%; margin-top: 14px; padding: 14px;
      background: #2a7a9b; color: white; font-size: 16px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #1f5f7a; }
    .btn-teal {
      display: block; width: 100%; margin-top: 10px; padding: 14px;
      background: #3dbcb8; color: white; font-size: 16px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .btn-teal:hover { background: #2ea09c; }
    .btn-limpar {
      display: block; width: 100%; margin-top: 10px; padding: 12px;
      background: #eaf6f6; color: #2a7a9b; font-size: 15px; font-weight: 600;
      border: 1.5px solid #b2e0de; border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .btn-limpar:hover { background: #d0eeee; }

    /* Divider */
    .divider { border: none; border-top: 1px solid #d0eeee; margin: 6px 0; }
  </style>
</head>

<script>
  function toggle(id, show) {
    const el = document.getElementById(id);
    if (show) el.classList.add('show');
    else el.classList.remove('show');
  }

  function getRadio(name) {
    const sel = document.querySelector('input[name="' + name + '"]:checked');
    return sel ? sel.value : 'Não especificado';
  }

  function val(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() || '—' : '—';
  }

  function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const cirurgia = getRadio('cirurgia');
    const quimio = getRadio('quimio');
    const trauma = getRadio('trauma');
    const margin = 15;
    let y = 20;
    const lineH = 7;
    const pageW = 210;

    function addTitle(text) {
      // Background rect for section title
      doc.setFillColor(234, 246, 246);
      doc.roundedRect(margin, y - 5, pageW - margin * 2, 8, 2, 2, 'F');
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(42, 122, 155);
      doc.text(text, margin + 3, y);
      doc.setDrawColor(61, 188, 184);
      doc.setLineWidth(0.5);
      doc.line(margin, y + 2, pageW - margin, y + 2);
      y += lineH + 3;
      doc.setTextColor(30, 30, 30);
      doc.setLineWidth(0.2);
    }

    function addField(label, value) {
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(42, 122, 155);
      doc.text(label + ':', margin, y);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      const lines = doc.splitTextToSize(value || '—', pageW - margin - 60);
      doc.text(lines, 65, y);
      y += lineH * lines.length;
      if (y > 270) { doc.addPage(); y = 20; }

      doc.setFontSize(8);

      doc.text('Aliva Saúde — Imagiologia | Documento gerado em ' + new Date().toLocaleDateString('pt-AO'), pageW / 2, 290, { align: 'center' });
      doc.setDrawColor(61, 188, 184);
      doc.setLineWidth(0.3);
      doc.line(margin, 286, pageW - margin, 286);
    }

    const nomePaciente = val('nome') !== '—' ? val('nome').replace(/\s+/g, '-') : 'paciente';
    const dataHoje = new Date().toLocaleDateString('pt-AO').replace(/\//g, '-');
    doc.save('Historia-Clinica-' + nomePaciente + '-' + dataHoje + '.pdf');
  }

  function enviarEmail() {
    const emailDest = val('emailDest');
    if (emailDest === '—') { alert('Por favor, insira o email de destino.'); return; }
    const cirurgia = getRadio('cirurgia');
    const quimio = getRadio('quimio');
    const trauma = getRadio('trauma');

    const corpo =
      'HISTÓRIA CLÍNICA — ALIVA SAÚDE\n' +
      '==============================\n' +
      'Data: ' + new Date().toLocaleDateString('pt-AO') +
      '\n\nDADOS DO PACIENTE\n-----------------' +
      '\nNome:              ' + val('nome') +
      '\nData de Nasc.:     ' + val('dataNasc') +
      '\nID do Paciente:    ' + val('processo') +
      '\nExame Solicitado:  ' + val('exame') +
      '\n\nHISTÓRIA CLÍNICA\n----------------' +
      '\nHipótese Diag.:    ' + val('hipotese') +
      '\nCirurgia Prévia:   ' + cirurgia + (cirurgia === 'Sim' ? ' — ' + val('cirurgiaQual') : '') +
      '\nQuimio/Radio:      ' + quimio + (quimio === 'Sim' ? ' — há ' + val('quimioTempo') : '') +
      '\nTrauma:            ' + trauma + (trauma === 'Sim' ? ' — ' + val('traumaQual') : '') +
      '\nFebre/Sintomas:    ' + val('febre') +
      '\nInício Sintomas:   ' + val('inicioSintomas');

    const assunto = 'História Clínica — ' + val('nome') + ' — ' + val('exame');
    window.location.href = 'mailto:' + encodeURIComponent(emailDest) +
      '?subject=' + encodeURIComponent(assunto) +
      '&body=' + encodeURIComponent(corpo);
  }

  function limparFormulario() {
    if (!confirm('Tens a certeza que queres limpar o formulário?')) return;
    document.querySelectorAll('input[type="text"], input[type="date"], input[type="email"], textarea').forEach(function(el) { el.value = ''; });
    document.querySelectorAll('input[type="radio"]').forEach(function(el) { el.checked = false; });
    document.querySelectorAll('.conditional').forEach(function(el) { el.classList.remove('show'); });
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
